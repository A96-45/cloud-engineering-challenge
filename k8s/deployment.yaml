apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-optimizer
  namespace: default
  labels:
    app: cloud-optimizer
    version: v1.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cloud-optimizer
  template:
    metadata:
      labels:
        app: cloud-optimizer
        version: v1.0
    spec:
      containers:
      - name: cloud-optimizer
        image: ghcr.io/A96-45/cloud-engineering-challenge:main-latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        env:
        - name: FLASK_ENV
          value: "production"
        - name: PORT
          value: "5000"
        resources:
          requests:
            memory: "512Mi"     # CHANGED: Increased from 256Mi
            cpu: "250m"         # CHANGED: Increased from 100m
          limits:
            memory: "1Gi"       # CHANGED: Increased from 512Mi
            cpu: "1000m"        # CHANGED: Increased from 500m
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - name: logs
          mountPath: /var/log/app
      volumes:
      - name: logs
        emptyDir: {}
