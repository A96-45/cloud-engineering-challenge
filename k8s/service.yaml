apiVersion: v1
kind: Service
metadata:
  name: cloud-optimizer
  namespace: default
  labels:
    app: cloud-optimizer
spec:
  type: ClusterIP
  selector:
    app: cloud-optimizer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-optimizer-lb
  namespace: default
  labels:
    app: cloud-optimizer
spec:
  type: LoadBalancer
  selector:
    app: cloud-optimizer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
    nodePort: 30000
