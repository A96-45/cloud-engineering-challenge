<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Simple Login Page | Modern UI</title>
  <!-- Google Fonts for clean typography -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* Login card container */
    .login-container {
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
    }

    .login-card {
      background: white;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      padding: 2.5rem 2rem 2.8rem 2rem;
      transition: transform 0.2s ease;
    }

    .login-card:hover {
      transform: translateY(-2px);
    }

    /* Header section */
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(120deg, #1e293b, #2d3e6e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      margin-bottom: 0.5rem;
    }

    .login-header p {
      color: #64748b;
      font-size: 0.9rem;
      font-weight: 400;
    }

    /* Form group styles */
    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-weight: 500;
      font-size: 0.85rem;
      color: #334155;
      margin-bottom: 0.5rem;
      letter-spacing: -0.2px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      color: #94a3b8;
      font-size: 1.1rem;
      pointer-events: none;
    }

    .form-group input {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.5rem;
      font-size: 0.95rem;
      font-family: 'Inter', monospace;
      border: 1.5px solid #e2e8f0;
      border-radius: 20px;
      background: #ffffff;
      transition: all 0.2s ease;
      outline: none;
      color: #0f172a;
      font-weight: 500;
    }

    .form-group input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }

    .form-group input::placeholder {
      color: #cbd5e1;
      font-weight: 400;
      font-size: 0.85rem;
    }

    /* Options row (remember + forgot) */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.8rem;
      font-size: 0.8rem;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      color: #475569;
      cursor: pointer;
    }

    .checkbox-label input {
      width: 16px;
      height: 16px;
      accent-color: #7c3aed;
      cursor: pointer;
      margin: 0;
    }

    .forgot-link {
      color: #7c3aed;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: #5b21b6;
      text-decoration: underline;
    }

    /* Login button */
    .login-btn {
      width: 100%;
      background: linear-gradient(98deg, #7c3aed 0%, #a855f7 100%);
      border: none;
      padding: 0.9rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(124, 58, 237, 0.25);
      margin-bottom: 1.5rem;
    }

    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(124, 58, 237, 0.35);
      background: linear-gradient(98deg, #6d28d9 0%, #9333ea 100%);
    }

    .login-btn:active {
      transform: translateY(1px);
    }

    /* signup redirect */
    .signup-prompt {
      text-align: center;
      font-size: 0.85rem;
      color: #475569;
      border-top: 1px solid #f0f2f5;
      padding-top: 1.5rem;
      margin-top: 0.25rem;
    }

    .signup-prompt a {
      color: #7c3aed;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s;
    }

    .signup-prompt a:hover {
      color: #5b21b6;
      text-decoration: underline;
    }

    /* demo credentials hint (simple but useful for test) */
    .demo-hint {
      background: #f8fafc;
      border-radius: 18px;
      padding: 0.9rem;
      margin-top: 1.6rem;
      font-size: 0.75rem;
      text-align: center;
      color: #4b5563;
      border: 1px solid #eef2ff;
    }

    .demo-hint span {
      font-family: monospace;
      background: #e9eef3;
      padding: 0.2rem 0.5rem;
      border-radius: 30px;
      font-weight: 500;
      font-size: 0.7rem;
    }

    .error-message {
      background: #fee2e2;
      color: #b91c1c;
      padding: 0.7rem;
      border-radius: 24px;
      font-size: 0.8rem;
      text-align: center;
      margin-bottom: 1.2rem;
      display: none;
      font-weight: 500;
      border-left: 4px solid #ef4444;
    }

    .success-message {
      background: #dcfce7;
      color: #15803d;
      padding: 0.7rem;
      border-radius: 24px;
      font-size: 0.8rem;
      text-align: center;
      margin-bottom: 1.2rem;
      display: none;
      font-weight: 500;
      border-left: 4px solid #22c55e;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 1.8rem 1.5rem 2rem 1.5rem;
      }
      .login-header h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Welcome back</h1>
      <p>Sign in to your account</p>
    </div>

    <!-- dynamic feedback messages -->
    <div id="errorMsg" class="error-message"></div>
    <div id="successMsg" class="success-message"></div>

    <!-- login form -->
    <form id="loginForm" action="#" method="POST">
      <div class="form-group">
        <label for="email">Email address</label>
        <div class="input-wrapper">
          <span class="input-icon">✉️</span>
          <input type="email" id="email" name="email" placeholder="hello@example.com" autocomplete="email" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" id="rememberCheck"> Remember me
        </label>
        <a href="#" class="forgot-link" id="forgotPasswordLink">Forgot password?</a>
      </div>

      <button type="submit" class="login-btn">Log in</button>

      <div class="signup-prompt">
        Don't have an account? <a href="#" id="signupLink">Create account</a>
      </div>
    </form>

    <!-- subtle demo credentials for testing (simple login simulation) -->
    <div class="demo-hint">
      🔐 Demo credentials: <span>user@example.com</span> &nbsp;|&nbsp; <span>password123</span>
      <br>(any email + password works, but these show success)
    </div>
  </div>
</div>

<script>
  (function() {
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const errorDiv = document.getElementById('errorMsg');
    const successDiv = document.getElementById('successMsg');
    const rememberCheck = document.getElementById('rememberCheck');
    const forgotLink = document.getElementById('forgotPasswordLink');
    const signupLink = document.getElementById('signupLink');

    // Helper to hide messages
    function hideMessages() {
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';
      errorDiv.innerText = '';
      successDiv.innerText = '';
    }

    function showError(message) {
      hideMessages();
      errorDiv.innerText = message;
      errorDiv.style.display = 'block';
      setTimeout(() => {
        if (errorDiv.style.display === 'block') {
          errorDiv.style.opacity = '0.9';
        }
      }, 10);
    }

    function showSuccess(message) {
      hideMessages();
      successDiv.innerText = message;
      successDiv.style.display = 'block';
    }

    // simple email validation (basic)
    function isValidEmail(email) {
      const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
      return emailRegex.test(email);
    }

    // store "remember me" in localStorage (dummy feature)
    function loadRememberedCredentials() {
      const rememberedEmail = localStorage.getItem('rem_email');
      const rememberedPass = localStorage.getItem('rem_pass');
      const rememberFlag = localStorage.getItem('remember_flag') === 'true';
      if (rememberFlag && rememberedEmail && rememberedPass) {
        emailInput.value = rememberedEmail;
        passwordInput.value = rememberedPass;
        rememberCheck.checked = true;
      } else {
        // just to keep consistent: if flag false but values exist, do nothing
        rememberCheck.checked = false;
      }
    }

    function saveRememberMe() {
      if (rememberCheck.checked) {
        localStorage.setItem('rem_email', emailInput.value.trim());
        localStorage.setItem('rem_pass', passwordInput.value);
        localStorage.setItem('remember_flag', 'true');
      } else {
        localStorage.removeItem('rem_email');
        localStorage.removeItem('rem_pass');
        localStorage.setItem('remember_flag', 'false');
      }
    }

    // handle login simulation (simple interactive, not real auth)
    function handleLogin(event) {
      event.preventDefault();

      hideMessages();
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      // validation
      if (!email || !password) {
        showError('❌ Please enter both email and password.');
        return;
      }
      if (!isValidEmail(email)) {
        showError('❌ Please enter a valid email address (e.g., name@domain.com).');
        return;
      }
      if (password.length < 4) {
        showError('❌ Password must be at least 4 characters.');
        return;
      }

      // Simulate success for demo purposes
      // For the given demo hint, if user uses the demo credentials, it's also just success
      // But we will treat any valid entry as a successful login (with cool message)
      // Additional "special" demo check for fun
      const isDemoAccount = (email === 'user@example.com' && password === 'password123');
      
      // Save remember me state
      saveRememberMe();

      // SUCCESS simulation
      let displayName = email.split('@')[0];
      if (isDemoAccount) displayName = "Demo User";
      showSuccess(`✨ Welcome back, ${displayName}! Login successful. (Demo mode)`);
      
      // You can redirect to dashboard if you want, but for simplicity show alert after small delay
      // For real production, you'd send data to backend.
      setTimeout(() => {
        // optional: reset form or just show feedback. For pure UI demo, we keep message.
        // No actual redirect but displays success, you can uncomment redirect line:
        // window.location.href = "/dashboard.html";
        // but since this is a simple standalone page, we just demonstrate success.
        if (successDiv.style.display === 'block') {
          // additional console flair
          console.log(`✅ Login simulation: ${email}`);
        }
      }, 300);
    }

    // Forgot password simulation (nice alert)
    function simulateForgotPassword(e) {
      e.preventDefault();
      hideMessages();
      const emailVal = emailInput.value.trim();
      if (!emailVal || !isValidEmail(emailVal)) {
        showError('📧 Please enter a valid email address in the field above to reset password.');
      } else {
        showSuccess(`🔐 Password reset link sent to ${emailVal} (demo).`);
      }
    }

    // Signup simulation (just informative)
    function simulateSignup(e) {
      e.preventDefault();
      hideMessages();
      showSuccess('📝 Create a new account — this is a demo login page. In a real app, you would be redirected.');
      // optional clear form or whatever
    }

    // attach event listeners
    form.addEventListener('submit', handleLogin);
    forgotLink.addEventListener('click', simulateForgotPassword);
    signupLink.addEventListener('click', simulateSignup);

    // load remembered credentials if any
    loadRememberedCredentials();

    // clear messages on input change if needed
    emailInput.addEventListener('input', () => {
      if (errorDiv.style.display === 'block' || successDiv.style.display === 'block') hideMessages();
    });
    passwordInput.addEventListener('input', () => {
      if (errorDiv.style.display === 'block' || successDiv.style.display === 'block') hideMessages();
    });
  })();
</script>
</body>
</html>
